<p-toast></p-toast>
<div class="text-center mb-8 animate-fadein">
    <h1 class="text-3xl font-bold text-gray-800">Revisa tu correo</h1>
    
    <p class="text-gray-500 mt-4 leading-relaxed">
        Hemos enviado un enlace seguro para recuperar tu contraseña a: <br>
        <strong class="text-gray-800 text-lg">{{ email }}</strong>
    </p>
    
    <p class="text-gray-500 mt-4 text-sm">
        Haz clic en el enlace del correo para crear tu nueva contraseña. <br>
        <span class="text-xs">(Si no lo encuentras, revisa tu carpeta de Spam)</span>
    </p>
</div>

<div class="space-y-6 flex flex-col items-center animate-fadein w-full">
    
    <button 
        pButton 
        type="button" 
        label="Volver al Login" 
        routerLink="/login"
        class="w-full h-12 rounded-full bg-[#ffed00] border-none text-black font-bold hover:bg-[#e6d500] transition-colors"
    ></button>

    <div class="text-center">
        <p class="text-sm text-gray-600">¿No recibiste el correo? 
            <button type="button" (click)="resend()" class="font-bold text-gray-800 hover:underline bg-transparent border-none cursor-pointer">
                Reenviar enlace
            </button>
        </p>
    </div>
</div>
