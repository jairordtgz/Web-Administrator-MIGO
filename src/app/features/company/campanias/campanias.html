<div class="px-6 pt-4 pb-6 min-h-full relative font-sans">
    <div class="bg-white p-6 shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center rounded-sm border-b-4 border-primary">
        <div>
            <h1 class="text-3xl font-black text-[#2b2b2b] uppercase tracking-tighter">MIS CAMPAÑAS</h1>
            <p class="text-sm text-gray-500 font-medium mt-1">Gestiona tus campañas publicitarias activas y pasadas</p>
        </div>
        <div class="mt-4 md:mt-0">
            <button pButton label="CREAR NUEVA CAMPAÑA" icon="pi pi-plus" 
                class="p-button-warning !rounded-full !font-bold !px-6 shadow-sm"
                [routerLink]="['crear']"></button>
        </div>
    </div>

    <!-- Empty State for Layout -->
    <div class="bg-white p-12 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
        <div class="bg-gray-50 p-6 rounded-full mb-6">
            <i class="pi pi-megaphone text-6xl text-gray-200"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-700 mb-2">No tienes campañas creadas aún</h3>
        <p class="text-gray-500 max-w-md mx-auto mb-8">Comienza a publicitar tu marca creando tu primera campaña y seleccionando los mejores conductores de la ciudad.</p>
        
        <button pButton label="COMENZAR AHORA" icon="pi pi-rocket" 
            class="p-button-warning !rounded-full !font-bold !px-12 !py-4 shadow-lg transform hover:scale-105 transition-all"
            [routerLink]="['crear']"></button>
    </div>
</div>
